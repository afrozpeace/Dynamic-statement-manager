<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Statement Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <h3 class="mb-4 text-center">Dynamic Statement Manager</h3>
        <table class="table table-bordered text-center align-middle bg-white shadow-sm">
            <thead class="table-warning">
                <tr>
                    <th></th>
                    <th><input type="date" id="date" class="form-control"></th>
                    <th><input type="text" id="header" class="form-control" placeholder="Transaction Type"></th>
                    <th id="creditHeading" style="cursor:pointer;" class="text-success">+ Credit</th>
                    <th id="debitHeading" style="cursor:pointer;" class="text-danger">- Debit</th>
                    <th><button id="addBtn" class="btn btn-primary w-100">Add</button></th>
                </tr>
                <tr id="amountRow" style="display:none;">
                    <th colspan="3"></th>
                    <th><input type="number" id="credit" class="form-control d-none" placeholder="0"></th>
                    <th><input type="number" id="debit" class="form-control d-none" placeholder="0"></th>
                    <th></th>
                </tr>
                <tr class="table-secondary">
                    <th>ID</th><th>Date</th><th>Header</th><th>Credit</th><th>Debit</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
            <tfoot>
                <tr class="table-light">
                    <th colspan="3" class="text-end fw-bold">Total</th>
                    <th id="totalCredit" class="text-success fw-bold">0</th>
                    <th id="totalDebit" class="text-danger fw-bold">0</th>
                    <th></th>
                </tr>
                <tr class="table-dark">
                    <th colspan="3" class="text-end fw-bold">Balance</th>
                    <th colspan="3" id="balance" class="fw-bold">0</th>
                </tr>
            </tfoot>
        </table>
    </div>
    <script src="JS/index.js"></script>
</body>
</html>
