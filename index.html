<!DOCTYPE html>
<html>

<head>
  <title>Statement Manager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="CSS/style.css">
</head>

<body class="bg-light p-4">

<div class="container">

  <h3 class="mb-4 text-center">Dynamic Statement Manager</h3>

  <table class="table table-bordered text-center align-middle">

    <thead class="table-warning">

      <!-- INPUT ROW -->
      <tr>
        <th></th>

        <th>
          <input type="date" id="date" class="form-control">
        </th>

        <th>
          <input type="text" id="header" class="form-control" placeholder="Transaction Type">
        </th>

        <th id="creditHeading" style="cursor:pointer;">
          Credit
        </th>

        <th id="debitHeading" style="cursor:pointer;">
          Debit
        </th>

        <th>
          <button id="addBtn" class="btn btn-primary w-100">
            Add
          </button>
        </th>
      </tr>


      <!-- CREDIT / DEBIT INPUT ROW (Hidden initially) -->
      <tr id="amountRow" style="display:none;">

        <th></th>
        <th></th>
        <th></th>

        <th>
          <input
            type="number"
            id="credit"
            class="form-control d-none"
            placeholder="Enter Credit Amount"
          >
        </th>

        <th>
          <input
            type="number"
            id="debit"
            class="form-control d-none"
            placeholder="Enter Debit Amount"
          >
        </th>

        <th></th>

      </tr>


      <!-- TABLE HEADINGS -->
      <tr>

        <th>ID</th>
        <th>Date</th>
        <th>Header</th>
        <th>Credit</th>
        <th>Debit</th>
        <th>Action</th>

      </tr>

    </thead>


    <!-- DATA ROWS -->
    <tbody id="tbody"></tbody>


    <!-- FOOTER -->
    <tfoot>

      <tr>
        <th colspan="3">Total</th>

        <th id="totalCredit">0</th>

        <th id="totalDebit">0</th>

        <th></th>
      </tr>

      <tr>
        <th colspan="3">Balance</th>

        <th colspan="3" id="balance">0</th>
      </tr>

    </tfoot>

  </table>

</div>


<script src="JS/index.js"></script>

</body>
</html>
